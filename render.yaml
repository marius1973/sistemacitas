# Blueprint de Render: backend + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: citas-db
    plan: free
    databaseName: citas_medicas
    user: citas_user

services:
  - type: web
    name: sistema-citas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://sistemacitas.vercel.app,http://localhost:5173"
      - key: APP_SEED_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: citas-db
          property: connectionString
