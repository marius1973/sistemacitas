# Perfil por defecto: h2 (memoria) para desarrollo rapido.
# Para produccion usar el perfil "postgres" (ver application-postgres.properties) con: --spring.profiles.active=postgres
spring.application.name=sistema-citas-medicas

spring.datasource.url=jdbc:h2:mem:citasdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=cambiar-este-secreto-en-produccion-por-uno-seguro-de-al-menos-256-bits
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Email (opcional; sin SMTP solo registra en logs)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@clinica.com}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
