server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

app.jwt.secret=${APP_JWT_SECRET:change-me-set-APP_JWT_SECRET-in-render}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://sistemacitas.vercel.app,http://localhost:5173}
app.seed.enabled=${APP_SEED_ENABLED:true}
